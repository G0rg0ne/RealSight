apiVersion: apps/v1
kind: Deployment
metadata:
  name: realsight-triton
  namespace: realsight
  labels:
    app.kubernetes.io/name: realsight-triton
    app.kubernetes.io/part-of: realsight
    app.kubernetes.io/component: inference
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: realsight-triton
  template:
    metadata:
      labels:
        app.kubernetes.io/name: realsight-triton
        app.kubernetes.io/part-of: realsight
        app.kubernetes.io/component: inference
    spec:
      containers:
        - name: triton
          image: g0rg0ne/realsight-triton:v1.0.0
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-c"]
          args:
            - exec tritonserver --model-repository="${MODEL_REPOSITORY_PATH}" --log-verbose=1
          ports:
            - name: http
              containerPort: 8000
            - name: grpc
              containerPort: 8001
            - name: metrics
              containerPort: 8002
          envFrom:
            - configMapRef:
                name: realsight-config
          livenessProbe:
            httpGet:
              path: /v2/health/live
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: /v2/health/ready
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 12
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: realsight-triton
  namespace: realsight
  labels:
    app.kubernetes.io/name: realsight-triton
    app.kubernetes.io/part-of: realsight
    app.kubernetes.io/component: inference
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: realsight-triton
  ports:
    - name: http
      port: 8000
      targetPort: http
    - name: grpc
      port: 8001
      targetPort: grpc
    - name: metrics
      port: 8002
      targetPort: metrics
