apiVersion: apps/v1
kind: Deployment
metadata:
  name: realsight-api
  namespace: realsight
  labels:
    app.kubernetes.io/name: realsight-api
    app.kubernetes.io/part-of: realsight
    app.kubernetes.io/component: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: realsight-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: realsight-api
        app.kubernetes.io/part-of: realsight
        app.kubernetes.io/component: api
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: api
          image: g0rg0ne/realsight-api:v1.1.3
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8888
          envFrom:
            - configMapRef:
                name: realsight-config
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 12
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: realsight-api
  namespace: realsight
  labels:
    app.kubernetes.io/name: realsight-api
    app.kubernetes.io/part-of: realsight
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: realsight-api
  ports:
    - name: http
      port: 8888
      targetPort: http
