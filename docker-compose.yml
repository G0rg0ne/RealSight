services:
  triton:
    build:
      context: .
      dockerfile: triton/Dockerfile
    env_file:
      - .env
    environment:
      - MODEL_REPOSITORY_PATH=/models
    ports:
      - "${TRITON_HTTP_PORT:-8000}:8000"
      - "${TRITON_GRPC_PORT:-8001}:8001"
      - "${TRITON_METRICS_PORT:-8002}:8002"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v2/health/live"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 120s
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    ports:
      - "${API_PORT:-8888}:8888"
    depends_on:
      triton:
        condition: service_healthy
